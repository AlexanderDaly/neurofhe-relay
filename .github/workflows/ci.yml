name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: Validate prototype
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run validation
        run: npm run validate

      - name: Smoke demo and benchmark
        run: |
          npm run demo --silent > /tmp/neurofhe-demo.json
          npm run benchmark --silent > /tmp/neurofhe-benchmark.json
          node - <<'NODE'
          const fs = require('fs');
          const demo = JSON.parse(fs.readFileSync('/tmp/neurofhe-demo.json', 'utf8'));
          const benchmark = JSON.parse(fs.readFileSync('/tmp/neurofhe-benchmark.json', 'utf8'));
          if (demo.classification !== 'anomaly') throw new Error('unexpected demo classification');
          if (!benchmark.results.plaintextMatchesEncrypted) throw new Error('benchmark mismatch');
          console.log('prototype smoke ok');
          NODE
